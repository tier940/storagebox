#
# The "gradle.properties" file contains settings loaded by all gradle files.
# For the "build.gradle" file, all properties are stored in the separate and dedicated file "buildscript.properties".
# Properties can be created via any sequence of ASCII characters followed by an equal sign to set the value.
#


# Gradle Settings
# Effectively applies the '--stacktrace' flag by default
org.gradle.logging.stacktrace = all
# Sets default memory used for gradle commands. Can be overridden by user or command line properties.
# This is required to provide enough memory for the Minecraft decompilation process.
org.gradle.jvmargs = -Xmx3G -Dnet.bytebuddy.experimental=true -Ddevelocity.deprecation.captureOrigin=true
# Run independent tasks in parallel to speed up builds.
org.gradle.parallel = true
# Reuse outputs from previous builds via the build cache.
org.gradle.caching = true
# NOTE: configuration-cache is intentionally left disabled. This buildscript resolves git
# information (gitVersion()/runShell) at configuration time, which is incompatible with it.
